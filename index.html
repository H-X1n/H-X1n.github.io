tailwind.config = {

      keyframes: {

        fadeIn: {

<style>
  :root {

  .hero-badge-stage {

  .hero-badge-fallback-role,

  .orbit-system {
    transform-origin: 330px 260px;
    animation: heroOrbitDrift 14s ease-in-out infinite;
  }

  .globe-shell {
    transform-origin: 330px 260px;
    animation: heroGlobeFloat 8.5s ease-in-out infinite;
  }

  .globe-outline,
  .globe-latitude,
  .globe-meridian,
  .globe-equator,
  .orbit-ring,
  .node-network path {
    fill: none;

    stroke-linejoin: round;
  }

  .globe-outline {
    stroke: rgba(31, 35, 41, 0.48);
    stroke-width: 1.45;
  }

  .globe-latitude,
  .globe-meridian,
  .globe-equator {
    stroke: rgba(31, 35, 41, 0.13);

  }

  .orbit-ring {
    stroke: rgba(31, 35, 41, 0.15);

  }

  .orbit-ring-tilt {

  }

  .orbit-satellite,

  .globe-dots {

  }

  .node-muted {

  }

  body.page-ready .ag-typed.visible .ag-letter {

  #hero .hero-actions {

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {

      animation-duration: 0.01ms !important;

      transition-duration: 0.01ms !important;
    }
    .reveal { opacity: 1; transform: none; filter: none; transition: none; }

    .ag-cursor,
    #hero .hero-actions,
    #hero .hero-stats.reveal.visible,

  }

  .card-hover {

  /* Card system */
  .glass-card {
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, #fbfbfb 0%, #ffffff 100%);

  .glass-card::after {

  .paper-card::before,

<script>
// ── Section loading ──────────────────────────────────────────────
const sections = [
  { file: 'sections/hero.html',         id: null },
  { file: 'sections/skills.html',       id: 'skills' },
  { file: 'sections/internship.html',   id: 'internship' },
  { file: 'sections/projects.html',     id: 'projects' },
  { file: 'sections/competitions.html', id: 'competitions' },
  { file: 'sections/publications.html', id: 'publications' },
  { file: 'sections/education.html',    id: 'education' },
  { file: 'sections/contact.html',      id: 'contact' },
];

const main = document.getElementById('content');

async function loadAllSections() {
  const promises = sections.map(async ({ file, id }) => {
    try {
      const resp = await fetch(file);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const html = await resp.text();
      return { id, html };
    } catch (err) {
      console.error(`加载失败: ${file}`, err);
      return { id, html: '' };
    }
  });

  const results = await Promise.all(promises);
  main.innerHTML = results.map(r => r.html).join('');

  // ── Re-initialize after DOM injection ──────────────────────────
  initAntigravityText();
  initHeroIntroScrollLock();
  initMotionState();
  initHeroBadge3D();
  initInternshipProjectToggles();
  initRevealObserver();
  initSmoothScroll();
}

// ── Antigravity-inspired typed text ──────────────────────────────
function initAntigravityText() {
  document.querySelectorAll('[data-typed-text]').forEach(function(el) {
    if (el.dataset.typedReady === 'true') return;

    const text = el.dataset.typedText || el.textContent.trim();
    const mode = el.dataset.typeMode || 'word';
    const units = mode === 'flow' ? (text.match(/[A-Za-z0-9.+/-]+|\s+|./gu) || []) : Array.from(text);
    const start = Number(el.dataset.typeStart || 220);
    const step = Number(el.dataset.typeStep || 86);
    const hasCursor = el.dataset.typeCursor !== 'false';
    el.dataset.typedReady = 'true';
    el.setAttribute('aria-label', text);
    el.style.setProperty('--glyph-count', units.length);
    el.textContent = '';

    const word = document.createElement('span');
    word.className = mode === 'flow' ? 'ag-flow' : 'ag-word';
    word.setAttribute('aria-hidden', 'true');

    units.forEach(function(unit, index) {
      const letter = document.createElement('span');
      const isSpace = /^\s+$/.test(unit);
      letter.className = isSpace ? 'ag-letter ag-space' : 'ag-letter';
      letter.style.setProperty('--glyph-index', index);
      letter.style.setProperty('--glyph-delay', `${start + index * step}ms`);
      letter.style.setProperty('--glyph-duration', mode === 'flow' ? '560ms' : '760ms');
      letter.textContent = isSpace ? '\u00A0' : unit;
      word.appendChild(letter);
    });

    el.appendChild(word);

    if (hasCursor) {
      const cursor = document.createElement('span');
      cursor.className = 'ag-cursor';
      cursor.setAttribute('aria-hidden', 'true');
      cursor.style.setProperty('--cursor-delay', `${start + 80 + units.length * step}ms`);
      cursor.style.setProperty('--cursor-blink-delay', `${start + 760 + units.length * step}ms`);
      el.appendChild(cursor);
    }
  });
}

// ── Lock first-screen scroll until the intro sequence finishes ────
function initHeroIntroScrollLock() {
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const isDeepLink = window.location.hash && window.location.hash !== '#hero';
  if (reduceMotion || isDeepLink) return;

  const unlockDelay = 3920;
  const lockedKeys = new Set([' ', 'ArrowDown', 'ArrowUp', 'PageDown', 'PageUp', 'Home', 'End']);

  function preventScroll(event) {
    event.preventDefault();
  }

  function preventScrollKeys(event) {
    if (!lockedKeys.has(event.key)) return;
    if (event.target && ['INPUT', 'TEXTAREA', 'SELECT'].includes(event.target.tagName)) return;
    event.preventDefault();
  }

  function unlock() {
    document.documentElement.classList.remove('intro-locked');
    document.body.classList.remove('intro-locked');
    window.removeEventListener('wheel', preventScroll);
    window.removeEventListener('touchmove', preventScroll);
    window.removeEventListener('keydown', preventScrollKeys);
  }

  document.documentElement.classList.add('intro-locked');
  document.body.classList.add('intro-locked');
  window.scrollTo({ top: 0, left: 0, behavior: 'auto' });
  window.addEventListener('wheel', preventScroll, { passive: false });
  window.addEventListener('touchmove', preventScroll, { passive: false });
  window.addEventListener('keydown', preventScrollKeys);
  window.setTimeout(unlock, unlockDelay);
}

// ── Product-page motion state ───────────────────────────────────
function initMotionState() {
  document.querySelectorAll('main > section').forEach(function(section) {
    section.querySelectorAll('.reveal').forEach(function(el, index) {
      el.style.setProperty('--reveal-delay', `${Math.min(index * 70, 350)}ms`);

    card.style.setProperty('--reveal-delay', `${120 + index * 90}ms`);
  });

  requestAnimationFrame(function() {
    document.body.classList.add('page-ready');
  });

  const nav = document.querySelector('nav');
  if (!nav) return;

  function syncNavState() {
    nav.classList.toggle('nav-scrolled', window.scrollY > 12);
  }

  syncNavState();
  window.addEventListener('scroll', syncNavState, { passive: true });
}

// ── Interactive 3D hero badge ────────────────────────────────────
function initHeroBadge3D() {
  const stage = document.querySelector('[data-hero-badge]');
  if (!stage || stage.dataset.heroBadgeInit === 'true') return;

  const canvas = stage.querySelector('.hero-badge-canvas');
  if (!canvas) return;

  stage.dataset.heroBadgeInit = 'true';

  import('./assets/three.module.min.js')
    .then(function(THREE) {
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
      camera.position.set(0, 0.15, 8.2);

      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: true,
        preserveDrawingBuffer: true,
        powerPreference: 'high-performance',
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      if (THREE.SRGBColorSpace) renderer.outputColorSpace = THREE.SRGBColorSpace;

      scene.add(new THREE.HemisphereLight(0xffffff, 0xd9c7b8, 1.85));

      const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
      keyLight.position.set(3.8, 4.6, 5.2);
      keyLight.castShadow = true;
      scene.add(keyLight);

      const rimLight = new THREE.DirectionalLight(0xd2b39d, 1.2);
      rimLight.position.set(-4.5, 2.2, -3.5);
      scene.add(rimLight);

      const group = new THREE.Group();
      group.rotation.set(-0.08, -0.24, 0.02);
      scene.add(group);

      const badgeWidth = 3.15;
      const badgeHeight = 4.35;
      const badgeDepth = 0.18;
      const badgeRadius = 0.22;

      const bodyGeometry = createRoundedExtrudeGeometry(THREE, badgeWidth, badgeHeight, badgeRadius, badgeDepth);
      const bodyMaterial = new THREE.MeshStandardMaterial({
        color: 0xe7d7c8,
        roughness: 0.56,
        metalness: 0.08,
      });
      const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const frontTexture = new THREE.CanvasTexture(drawBadgeTexture('front'));
      const backTexture = new THREE.CanvasTexture(drawBadgeTexture('back'));
      if (THREE.SRGBColorSpace) {
        frontTexture.colorSpace = THREE.SRGBColorSpace;
        backTexture.colorSpace = THREE.SRGBColorSpace;
      }
      frontTexture.anisotropy = 8;
      backTexture.anisotropy = 8;

      const faceGeometry = new THREE.PlaneGeometry(badgeWidth - 0.08, badgeHeight - 0.08);
      const frontFace = new THREE.Mesh(faceGeometry, new THREE.MeshStandardMaterial({
        map: frontTexture,
        transparent: true,
        roughness: 0.48,
        metalness: 0.02,
      }));
      frontFace.position.z = badgeDepth / 2 + 0.075;
      group.add(frontFace);

      const backFace = new THREE.Mesh(faceGeometry, new THREE.MeshStandardMaterial({
        map: backTexture,
        transparent: true,
        roughness: 0.52,
        metalness: 0.02,
      }));
      backFace.position.z = -badgeDepth / 2 - 0.075;
      backFace.rotation.y = Math.PI;
      group.add(backFace);

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(0.19, 0.018, 18, 64),
        new THREE.MeshStandardMaterial({ color: 0xb99d86, roughness: 0.36, metalness: 0.42 })
      );
      ring.position.set(0, badgeHeight / 2 - 0.24, badgeDepth / 2 + 0.045);
      ring.rotation.x = Math.PI / 2;
      group.add(ring);

      const clip = new THREE.Mesh(
        new THREE.BoxGeometry(0.58, 0.08, 0.055),
        new THREE.MeshStandardMaterial({ color: 0x1f2329, roughness: 0.5, metalness: 0.18 })
      );
      clip.position.set(0, badgeHeight / 2 - 0.05, badgeDepth / 2 + 0.06);
      group.add(clip);

      const shadow = new THREE.Mesh(
        new THREE.CircleGeometry(1.9, 72),
        new THREE.MeshBasicMaterial({ color: 0x1f2329, transparent: true, opacity: 0.08 })
      );
      shadow.position.set(0, -2.7, -0.8);
      shadow.scale.set(1.35, 0.42, 1);
      shadow.rotation.x = -Math.PI / 2;
      scene.add(shadow);

      const pointer = { x: 0, y: 0 };
      let hovered = false;
      let dragging = false;
      let spin = -0.24;
      let dragPitch = -0.08;
      let lastPointerX = 0;
      let lastPointerY = 0;
      let currentSpeed = reduceMotion ? 0 : 0.0026;
      let frameId = 0;

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function resize() {
        const rect = stage.getBoundingClientRect();
        const width = Math.max(1, Math.floor(rect.width));
        const height = Math.max(1, Math.floor(rect.height));
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      function syncPointer(event) {
        const rect = stage.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width - 0.5) * 2;
        pointer.y = ((event.clientY - rect.top) / rect.height - 0.5) * 2;
      }

      function isPointerInsideStage(event) {
        const rect = stage.getBoundingClientRect();
        return event.clientX >= rect.left
          && event.clientX <= rect.right
          && event.clientY >= rect.top
          && event.clientY <= rect.bottom;
      }

      function onPointerDown(event) {
        dragging = true;
        hovered = true;
        lastPointerX = event.clientX;
        lastPointerY = event.clientY;
        syncPointer(event);
        stage.classList.add('is-dragging');
        stage.dataset.badgeMotion = 'dragging';
        if (stage.setPointerCapture) stage.setPointerCapture(event.pointerId);
        event.preventDefault();
      }

      function onPointerMove(event) {
        syncPointer(event);
        if (!dragging) return;

        const dx = event.clientX - lastPointerX;
        const dy = event.clientY - lastPointerY;
        spin += dx * 0.008;
        dragPitch = clamp(dragPitch + dy * 0.006, -0.72, 0.55);
        lastPointerX = event.clientX;
        lastPointerY = event.clientY;
      }

      function endDrag(event) {
        if (!dragging) return;
        dragging = false;
        hovered = isPointerInsideStage(event);
        stage.classList.remove('is-dragging');
        stage.dataset.badgeMotion = hovered ? 'slow' : 'normal';
        if (!hovered) {
          pointer.x = 0;
          pointer.y = 0;
        }
        if (stage.releasePointerCapture && stage.hasPointerCapture && stage.hasPointerCapture(event.pointerId)) {
          stage.releasePointerCapture(event.pointerId);
        }
      }

      function onPointerLeave() {
        if (dragging) return;
        hovered = false;
        stage.dataset.badgeMotion = 'normal';
        pointer.x = 0;
        pointer.y = 0;
      }

      stage.dataset.badgeMotion = 'normal';
      stage.addEventListener('pointerenter', function() {
        hovered = true;
        stage.dataset.badgeMotion = 'slow';
      });
      stage.addEventListener('pointerdown', onPointerDown);
      stage.addEventListener('pointermove', onPointerMove);
      stage.addEventListener('pointerup', endDrag);
      stage.addEventListener('pointercancel', endDrag);
      stage.addEventListener('pointerleave', onPointerLeave);

      const resizeObserver = new ResizeObserver(resize);
      resizeObserver.observe(stage);
      resize();

      function animate(time) {
        const targetSpeed = dragging ? 0 : (hovered ? 0.0007 : 0.0026);
        currentSpeed += (targetSpeed - currentSpeed) * 0.045;
        if (!reduceMotion) spin += currentSpeed;

        const floatY = reduceMotion ? 0 : Math.sin(time * 0.0014) * 0.08;
        group.position.y += (floatY - group.position.y) * 0.04;
        group.rotation.y += (spin + pointer.x * (dragging ? 0 : 0.16) - group.rotation.y) * 0.08;
        group.rotation.x += (dragPitch - pointer.y * (dragging ? 0 : 0.1) - group.rotation.x) * 0.08;
        group.rotation.z += (pointer.x * (dragging ? 0 : 0.028) - group.rotation.z) * 0.06;
        renderer.render(scene, camera);
        frameId = window.requestAnimationFrame(animate);
      }

      stage.dataset.badgeReady = 'true';
      frameId = window.requestAnimationFrame(animate);

      window.addEventListener('beforeunload', function() {
        window.cancelAnimationFrame(frameId);
        resizeObserver.disconnect();
        renderer.dispose();
      }, { once: true });
    })
    .catch(function(error) {
      console.warn('3D badge failed to initialize:', error);
    });
}

function createRoundedExtrudeGeometry(THREE, width, height, radius, depth) {
  const x = -width / 2;
  const y = -height / 2;
  const shape = new THREE.Shape();
  shape.moveTo(x + radius, y);
  shape.lineTo(x + width - radius, y);
  shape.quadraticCurveTo(x + width, y, x + width, y + radius);
  shape.lineTo(x + width, y + height - radius);
  shape.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  shape.lineTo(x + radius, y + height);
  shape.quadraticCurveTo(x, y + height, x, y + height - radius);
  shape.lineTo(x, y + radius);
  shape.quadraticCurveTo(x, y, x + radius, y);

  const geometry = new THREE.ExtrudeGeometry(shape, {
    depth,
    bevelEnabled: true,
    bevelSize: 0.035,
    bevelThickness: 0.035,
    bevelSegments: 8,
    curveSegments: 18,
  });
  geometry.center();
  return geometry;
}

function drawField(ctx, x, y, label, value) {

function drawChip(ctx, x, y, width, height, text, background, color) {
  ctx.fillStyle = background;
  drawRoundRect(ctx, x, y, width, height, height / 2);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.font = '700 20px Inter, "Noto Sans SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x + width / 2, y + height / 2 + 1);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

function drawRoundRect(ctx, x, y, width, height, radius) {
  const r = Math.min(radius, width / 2, height / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + width - r, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + r);
  ctx.lineTo(x + width, y + height - r);
  ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
  ctx.lineTo(x + r, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
  let line = '';
  let currentY = y;
  Array.from(text).forEach(function(char) {
    const nextLine = line + char;
    if (ctx.measureText(nextLine).width > maxWidth && line) {
      ctx.fillText(line, x, currentY);
      line = char;
      currentY += lineHeight;
    } else {
      line = nextLine;
    }
  });
  if (line) ctx.fillText(line, x, currentY);
}

// ── Scroll reveal ────────────────────────────────────────────────
function initRevealObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

// ── Smooth scroll ────────────────────────────────────────────────
function initSmoothScroll() {
  const menuBtn = document.getElementById('menu-btn');
  const mobileMenu = document.getElementById('mobile-menu');
  let menuCloseTimer = null;

  function openMobileMenu() {
    clearTimeout(menuCloseTimer);
    mobileMenu.classList.remove('hidden');
    requestAnimationFrame(function() {
      mobileMenu.classList.add('is-open');
      menuBtn.setAttribute('aria-expanded', 'true');
    });
  }

  function closeMobileMenu() {
    mobileMenu.classList.remove('is-open');
    menuBtn.setAttribute('aria-expanded', 'false');
    clearTimeout(menuCloseTimer);
    menuCloseTimer = setTimeout(function() {
      mobileMenu.classList.add('hidden');
    }, 360);
  }

  menuBtn.addEventListener('click', () => {
    if (mobileMenu.classList.contains('is-open')) {
      closeMobileMenu();
    } else {
      openMobileMenu();
    }
  });

  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
        closeMobileMenu();
      }
    });
  });
}

// ── Boot ─────────────────────────────────────────────────────────
loadAllSections();
</script>
